# values-qa.yaml — QA overrides
global:
  environment: qa

backend:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
  env:
    LOG_LEVEL: info
    RATE_LIMIT_MAX: "300"
    DB_POOL_MAX: "10"

frontend:
  replicaCount: 1
  hpa:
    enabled: false
