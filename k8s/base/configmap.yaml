apiVersion: v1
kind: ConfigMap
metadata:
  name: task-tracker-config
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  PORT: "5000"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  DB_PORT: "3306"
  DB_NAME: "tasktracker_prod"
  DB_POOL_MAX: "20"
  DB_POOL_MIN: "5"
  DB_POOL_ACQUIRE: "30000"
  DB_POOL_IDLE: "10000"
  JWT_EXPIRES_IN: "8h"
  JWT_REFRESH_EXPIRES_IN: "7d"
  RATE_LIMIT_MAX: "200"
  ALLOWED_ORIGINS: "https://app.rashmidevops.xyz"
  APP_VERSION: "1.0.0"
