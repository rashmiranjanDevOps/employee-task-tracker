# WARNING: Do NOT store actual secrets in Git.
# This is a template — real values are injected via:
#   - AWS Secrets Manager + External Secrets Operator
#   - Sealed Secrets
#   - Vault Agent Injector
# For local/dev only: edit the plain-text values under stringData directly —
# no base64 encoding needed, Kubernetes encodes stringData automatically.
apiVersion: v1
kind: Secret
metadata:
  name: task-tracker-secrets
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: secrets
type: Opaque
# Values below are plain-text placeholders — replaced by CI/CD or ESO before apply.
# stringData is used (not data) because these are not base64-encoded; the API
# server base64-encodes stringData values automatically on creation.
stringData:
  DB_HOST: REPLACE_WITH_RDS_ENDPOINT
  DB_USER: REPLACE_WITH_DB_USER
  DB_PASSWORD: REPLACE_WITH_DB_PASSWORD
  JWT_SECRET: REPLACE_WITH_JWT_SECRET
  JWT_REFRESH_SECRET: REPLACE_WITH_JWT_REFRESH_SECRET
